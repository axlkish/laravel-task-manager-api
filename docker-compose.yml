services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: task-manager-app
    volumes:
      - ./:/var/www
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: task-manager-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  postgres:
    image: postgres:16
    container_name: task-manager-postgres
    restart: always
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel

  redis:
    image: redis:7
    container_name: task-manager-redis
    ports:
      - "6379:6379"
    networks:
      - laravel

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: task-manager-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    networks:
      - laravel

  mailpit:
    image: axllent/mailpit
    container_name: task-manager-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - laravel

networks:
  laravel:

volumes:
  postgres_data:
  meili_data: